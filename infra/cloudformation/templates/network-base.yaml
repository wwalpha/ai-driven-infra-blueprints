AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-AZ network baseline for a public ALB and private EC2 web workload.

Parameters:
  Application:
    Type: String
    Default: web
  Environment:
    Type: String
    Default: dev
  VpcName:
    Type: String
    Default: web-dev
  ExportPrefix:
    Type: String
    Default: dev-web
  AvailabilityZone1:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: ap-northeast-1a
  AvailabilityZone2:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: ap-northeast-1c
  ZoneCode1:
    Type: String
    Default: a
  ZoneCode2:
    Type: String
    Default: c
  ExistingNatAz1AllocationId:
    Type: String
    Default: ''
  ExistingNatAz2AllocationId:
    Type: String
    Default: ''
  VpcCidr:
    Type: String
    Default: 10.10.0.0/16
  PublicSubnetAz1Cidr:
    Type: String
    Default: 10.10.0.0/24
  PublicSubnetAz2Cidr:
    Type: String
    Default: 10.10.1.0/24
  PrivateSubnetAz1Cidr:
    Type: String
    Default: 10.10.10.0/24
  PrivateSubnetAz2Cidr:
    Type: String
    Default: 10.10.11.0/24

Conditions:
  CreateNatAz1Eip: !Equals [!Ref ExistingNatAz1AllocationId, '']
  CreateNatAz2Eip: !Equals [!Ref ExistingNatAz2AllocationId, '']

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub vpc-${Application}-${Environment}

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub igw-${VpcName}

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref Vpc

  PublicSubnetAz1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Ref AvailabilityZone1
      CidrBlock: !Ref PublicSubnetAz1Cidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub sbnt-${VpcName}-web-public-${ZoneCode1}-01

  PublicSubnetAz2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Ref AvailabilityZone2
      CidrBlock: !Ref PublicSubnetAz2Cidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub sbnt-${VpcName}-web-public-${ZoneCode2}-02

  PrivateSubnetAz1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Ref AvailabilityZone1
      CidrBlock: !Ref PrivateSubnetAz1Cidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub sbnt-${VpcName}-app-private-${ZoneCode1}-01

  PrivateSubnetAz2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Ref AvailabilityZone2
      CidrBlock: !Ref PrivateSubnetAz2Cidr
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub sbnt-${VpcName}-app-private-${ZoneCode2}-02

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub rtb-${VpcName}-web-public-01

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetAz1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetAz1

  PublicSubnetAz2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetAz2

  NatAz1Eip:
    Type: AWS::EC2::EIP
    Condition: CreateNatAz1Eip
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub eip-${VpcName}-egress-01

  NatAz2Eip:
    Type: AWS::EC2::EIP
    Condition: CreateNatAz2Eip
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub eip-${VpcName}-egress-02

  NatGatewayAz1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !If
        - CreateNatAz1Eip
        - !GetAtt NatAz1Eip.AllocationId
        - !Ref ExistingNatAz1AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnetAz1
      Tags:
        - Key: Name
          Value: !Sub natgw-${VpcName}-${ZoneCode1}

  NatGatewayAz2:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !If
        - CreateNatAz2Eip
        - !GetAtt NatAz2Eip.AllocationId
        - !Ref ExistingNatAz2AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnetAz2
      Tags:
        - Key: Name
          Value: !Sub natgw-${VpcName}-${ZoneCode2}

  PrivateRouteTableAz1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub rtb-${VpcName}-app-private-${ZoneCode1}-01

  PrivateRouteTableAz1DefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableAz1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayAz1

  PrivateSubnetAz1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTableAz1
      SubnetId: !Ref PrivateSubnetAz1

  PrivateRouteTableAz2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub rtb-${VpcName}-app-private-${ZoneCode2}-02

  PrivateRouteTableAz2DefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableAz2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayAz2

  PrivateSubnetAz2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTableAz2
      SubnetId: !Ref PrivateSubnetAz2

Outputs:
  VpcId:
    Value: !Ref Vpc
    Export:
      Name: !Sub ${ExportPrefix}-VpcId
  PublicSubnetAz1Id:
    Value: !Ref PublicSubnetAz1
    Export:
      Name: !Sub ${ExportPrefix}-PublicSubnetAz1Id
  PublicSubnetAz2Id:
    Value: !Ref PublicSubnetAz2
    Export:
      Name: !Sub ${ExportPrefix}-PublicSubnetAz2Id
  PrivateSubnetAz1Id:
    Value: !Ref PrivateSubnetAz1
    Export:
      Name: !Sub ${ExportPrefix}-PrivateSubnetAz1Id
  PrivateSubnetAz2Id:
    Value: !Ref PrivateSubnetAz2
    Export:
      Name: !Sub ${ExportPrefix}-PrivateSubnetAz2Id