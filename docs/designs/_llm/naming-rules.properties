# AWS Resource Naming Rules - LLM helper
# Canonical source: docs/designs/naming-rules.md

# Common rules
naming.common.separator=-
naming.common.defaultCase=lower-kebab-case
naming.common.numberFormat=2-digit-zero-padded
naming.common.zoneFormat=availability-zone-suffix
naming.common.fallback=apply-to-name-tag-when-resource-name-not-supported
naming.common.uppercaseExceptions=ISZ

# Placeholder notes
naming.placeholder.application=application-name
naming.placeholder.env=environment-name
naming.placeholder.vpcName=vpc-short-name
naming.placeholder.subnetType=subnet-role
naming.placeholder.routeType=route-type
naming.placeholder.zone=availability-zone-suffix
naming.placeholder.number=2-digit-sequence
naming.placeholder.purpose=resource-purpose
naming.placeholder.service=aws-service-or-target-service
naming.placeholder.companyName=company-identifier
naming.placeholder.dbType=database-engine-type
naming.placeholder.serviceName=service-name
naming.placeholder.loadBalancerType=load-balancer-type
naming.placeholder.ruleType=eventbridge-rule-type
naming.placeholder.source=source-name
naming.placeholder.destination=destination-name
naming.placeholder.targetRegion=target-region
naming.placeholder.accountId=aws-account-id
naming.placeholder.accountName=aws-account-short-name
naming.placeholder.dcLocation=datacenter-location
naming.placeholder.protocol=api-protocol
naming.placeholder.timeslot=schedule-slot
naming.placeholder.metricName=cloudwatch-metric-name
naming.placeholder.resourceName=monitored-resource-name
naming.placeholder.nameTag=auxiliary-name-tag
naming.placeholder.targetType=share-target-type
naming.placeholder.targetId=share-target-id
naming.placeholder.from=source-side
naming.placeholder.to=destination-side
naming.placeholder.domain=domain-name
naming.placeholder.endpointType=resolver-endpoint-type
naming.placeholder.awsService=aws-service-name
naming.placeholder.conditionThreshold=alarm-condition-and-threshold
naming.placeholder.severity=alarm-severity
naming.placeholder.lifecycleRuleAction=lifecycle-rule-action
naming.placeholder.purposeOrAppName=purpose-or-application-name
naming.placeholder.pattern=schedule-pattern
naming.placeholder.region=aws-region
naming.placeholder.sourceVpcName=source-vpc-short-name
naming.placeholder.sourceEnv=source-environment
naming.placeholder.targetVpcName=target-vpc-short-name
naming.placeholder.targetEnv=target-environment

# VPC
naming.vpc.vpc=vpc-{{application}}-{{env}}
naming.vpc.subnet=sbnt-{{vpcName}}-{{subnetType}}-{{routeType}}-{{zone}}-{{number}}
naming.vpc.routeTable=rtb-{{vpcName}}-{{subnetType}}-{{routeType}}[-{{zone}}]-{{number}}
naming.vpc.peeringConnection=pcx-{{sourceVpcName}}-{{sourceEnv}}-to-{{targetVpcName}}-{{targetEnv}}-{{number}}
naming.vpc.internetGateway=igw-{{vpcName}}
naming.vpc.endpoint=vpce-{{vpcName}}-{{service}}
naming.vpc.natGateway=natgw-{{vpcName}}-{{zone}}
naming.vpc.elasticIp=eip-{{vpcName}}-{{purpose}}-{{number}}
naming.vpc.transitGateway=tgw-{{purpose}}-{{env}}-{{number}}
naming.vpc.transitGatewayAttachment=tgwa-{{vpcName}}-{{number}}
naming.vpc.transitGatewayRouteTable=tgwrtb-{{vpcName}}-{{number}}
naming.vpc.transitGatewayAttachmentWorkload=tgwa-{{accountId}}-{{accountName}}
naming.vpc.transitGatewayRouteTableWorkload=tgwrtb-{{accountId}}-{{accountName}}
naming.vpc.customerGateway=cgw-{{dcLocation}}-{{number}}
naming.vpc.siteToSiteVpn=s2s-{{dcLocation}}-{{number}}

# S3
naming.s3.bucket=bckt-{{companyName}}-{{env}}-{{purpose}}-{{region}}
naming.s3.lifecycleRule={{purpose}}-{{lifecycleRuleAction}}

# RDS
naming.rds.instance=rds-{{dbType}}-{{env}}-{{number}}
naming.rds.subnetGroup=rdbsg-{{env}}-{{number}}
naming.rds.parameterGroup=rdbpg-{{env}}-db{{number}}
naming.rds.clusterParameterGroup=rdbcpg-{{env}}-db{{number}}
naming.rds.optionGroup=rdbog-{{env}}-db{{number}}

# EC2
naming.ec2.instance={{env}}-{{purpose}}{{number}}
naming.ec2.securityGroup={{env}}-{{serviceName}}-{{purpose}}{{number}}-sg
naming.ec2.launchTemplate=aslt-{{env}}-{{purpose}}{{number}}
naming.ec2.loadBalancer={{loadBalancerType}}-{{env}}-{{purpose}}{{number}}
naming.ec2.targetGroup=tgp-{{env}}-{{purpose}}{{number}}
naming.ec2.autoScalingGroup=asg-{{env}}-{{purpose}}{{number}}

# CloudWatch
naming.cloudwatch.alarm={{accountId}}:{{env}}:{{resourceName}}:ISZ/{{awsService}}.{{metricName}}[[.Max/Min]][[.condition+threshold]][[.severity]][[:nameTag]]
naming.cloudwatch.logGroup=cwlogs-{{env}}-{{purpose}}

# CloudFormation
naming.cloudformation.stack=cfn-stack-{{env}}-{{purpose}}{{number}}
naming.cloudformation.stackSet=cfn-{{env}}-{{purpose}}{{number}}-{{targetRegion}}
naming.cloudformation.changeSet=cfn-cset-{{env}}-{{purpose}}{{number}}

# KMS
naming.kms.alias=kms-{{env}}-{{serviceName}}-{{purpose}}

# Kinesis
naming.kinesis.firehose=kdf-{{env}}-{{purpose}}-{{source}}-to-{{destination}}
naming.kinesis.stream=kds-{{env}}-{{purpose}}-{{source}}-to-{{destination}}

# EventBridge
naming.eventbridge.rule=ebr-{{ruleType}}-{{env}}-{{purpose}}-{{source}}-to-{{destination}}
naming.eventbridge.scheduler=ebs-{{env}}-{{purpose}}-{{pattern}}-{{timeslot}}

# SNS / SQS / Lambda
naming.sns.topic=sns-{{env}}-{{purpose}}
naming.sqs.queue=sqs-{{env}}-{{purpose}}
naming.lambda.function=lmda-{{env}}-{{purpose}}

# IAM
naming.iam.role={{purposeOrAppName}}{{serviceName}}Role
naming.iam.policy={{purposeOrAppName}}{{serviceName}}Policy

# RAM
naming.ram.resourceShare=ram-{{serviceName}}-{{env}}-sharewith-{{targetType}}-{{targetId}}

# Route53
naming.route53.resolver=rslv-{{endpointType}}-{{purpose}}-{{env}}
naming.route53.resolverRule=rslvr-{{from}}-{{to}}-{{domain}}-{{env}}
naming.route53.profile=rpf-{{env}}-{{region}}

# Backup
naming.backup.vault=BackupVault
naming.backup.plan=BackupPlan{{number}}

# API Gateway
naming.apigateway.api=apigw-{{protocol}}-{{env}}-{{purpose}}